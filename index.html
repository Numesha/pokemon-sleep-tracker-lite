<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pokemon Sleep Tracker Lite</title>

<style>

body{

margin:0;

padding:16px;

background:#f3f4f6;

font-family:sans-serif;

}

h1{

margin-top:0;

}

.card{

background:white;

padding:16px;

border-radius:12px;

margin-bottom:12px;

}

input,

textarea{

width:100%;

box-sizing:border-box;

padding:10px;

margin-bottom:10px;

border:1px solid #ccc;

border-radius:8px;

font-size:16px;

}

button{

border:none;

padding:10px 16px;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

.primary{

background:#4caf50;

color:white;

}

.secondary{

background:#607d8b;

color:white;

}

.event-item{

padding:12px;

border:1px solid #ddd;

border-radius:10px;

margin-top:8px;

background:#fafafa;

}

</style>

</head>

<body>

<h1>Pokemon Sleep Tracker Lite</h1>

<div class="card">

<details id="eventCreateArea">

  <summary>

    ＋ 新規イベント作成

  </summary>

  <br>

  <input

    id="eventName"

    placeholder="イベント名"

  >

  <input

    id="eventStart"

    type="date"

  >

  <textarea

    id="eventNote"

    placeholder="イベント備考"

  ></textarea>

  <button

    id="saveEventBtn"

    class="primary"

  >

    イベント保存

  </button>

</details>

</div>

<div class="card">

  <h2>表示中のイベント</h2>

  <div id="currentEventArea"></div>
  
<div class="card">

<h2>イベント一覧</h2>

<button onclick="toggleEventList()"

        id="toggleEventListBtn">

  イベント一覧を隠す

</button>
  
<div id="eventList"></div>

  <div id="eventDetail" style="display:none;">

  <h2 id="detailTitle"></h2>

<div

  style="

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin:8px 0;

  "

>

  <div>

    <button onclick="prevDay()">◀</button>

    <span id="dayLabel">Day1</span>

    <button onclick="nextDay()">▶</button>

  </div>

  <div>

    <button

      id="sessionBtn1"

      onclick="selectSession(1)"

    >

      ①

    </button>

    <button

      id="sessionBtn2"

      onclick="selectSession(2)"

    >

      ②

    </button>

  </div>

</div>
    
  <details id="dayNoteSection">

  <summary>

    Day備考

  </summary>

  <textarea

    id="dayNote"

    placeholder="Day備考"

  ></textarea>

  <button onclick="saveDayNote()">

    保存

  </button>

</details>
    
<h3>ポケモン記録</h3>

<div

  style="

    display:flex;

    gap:8px;

    align-items:center;

    margin-bottom:10px;

  "

>

  <input

    id="pokemonName"

    list="pokemonCandidates"

    placeholder="ポケモン名を入力"

    style="

      margin:0;

      flex:1;

    "

  />

  <button

    onclick="addPokemonRecord()"

    style="

      width:48px;

      height:44px;

      flex-shrink:0;

    "

  >

    ＋

  </button>

</div>

<datalist id="pokemonCandidates"></datalist>

<details>

  <summary id="favoriteTitle">

    お気に入り (0)

  </summary>

  <div id="favoriteList"></div>

</details>
    
<details>

  <summary id="currentCandidateTitle">

    今回イベント候補 (0)

  </summary>

<input

  id="currentSearch"

  placeholder="ポケモンを検索"

>
  
  <div id="currentCandidateList"></div>

</details>

<details>

  <summary id="allCandidateTitle">

    全イベント候補 (0)

  </summary>

<input

  id="allSearch"

  placeholder="ポケモンを検索"

>
  
  <div id="allCandidateList"></div>

</details>
    


<div id="recordList"></div>

<button onclick="showSummary()">

📊 週間集計

</button>

<button onclick="undoLastAction()">

↩ 元に戻す

</button>
    
<div id="summaryArea" style="display:none;">

  <h3>週間集計</h3>

  <div id="summaryList"></div>

</div>

 
  
</div>

<div class="card">
  
<h3>バックアップ</h3>

<button onclick="exportData()">

  JSON出力

</button>

<input

  type="file"

  id="importFile"

  accept=".json"

  onchange="importData(event)"

>

</div>
  
<script src="app.js"></script>

</body>

</html>
