<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<meta name="theme-color" content="#4caf50">

<title>Pokemon Sleep Tracker Lite</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

-webkit-tap-highlight-color:transparent;

}

body{

font-family:-apple-system,BlinkMacSystemFont,sans-serif;

background:#f4f6f8;

color:#222;

padding:12px;

padding-bottom:80px;

}

h1{

font-size:24px;

margin-bottom:12px;

}

h2{

font-size:18px;

margin:12px 0;

}

button{

border:none;

border-radius:10px;

padding:10px 14px;

cursor:pointer;

font-size:14px;

}

input,textarea,select{

width:100%;

padding:10px;

border:1px solid #ccc;

border-radius:10px;

font-size:16px;

background:#fff;

}

textarea{

min-height:70px;

resize:vertical;

}

.card{

background:#fff;

border-radius:14px;

padding:12px;

margin-bottom:12px;

box-shadow:0 1px 4px rgba(0,0,0,.08);

}

.row{

display:flex;

gap:8px;

}

.row>*{

flex:1;

}

.primary{

background:#4caf50;

color:white;

}

.danger{

background:#e53935;

color:white;

}

.secondary{

background:#607d8b;

color:white;

}

.small{

padding:6px 10px;

font-size:13px;

}

.eventItem{

padding:10px;

border:1px solid #ddd;

border-radius:10px;

margin-bottom:8px;

}

.eventItem.active{

border:2px solid #4caf50;

}

.dayNav{

display:flex;

align-items:center;

justify-content:center;

gap:12px;

margin-bottom:10px;

}

.dayLabel{

font-size:20px;

font-weight:bold;

}

.recordItem{

display:flex;

align-items:center;

gap:8px;

padding:8px;

border-bottom:1px solid #eee;

}

.recordName{

flex:1;

font-weight:600;

}

.recordCount{

min-width:40px;

text-align:center;

font-weight:bold;

}

.suggestBox{

max-height:180px;

overflow:auto;

border:1px solid #ddd;

border-radius:10px;

margin-top:6px;

}

.suggestItem{

display:flex;

justify-content:space-between;

align-items:center;

padding:8px;

border-bottom:1px solid #eee;

}

.totalItem{

display:flex;

justify-content:space-between;

padding:8px;

border-bottom:1px solid #eee;

}

.hidden{

display:none;

}

.fileInput{

display:none;

}

.footerSpace{

height:40px;

}

</style>

</head>

<body>

<h1>Pokemon Sleep Tracker Lite</h1>

<div class="card">

<h2>イベント作成</h2>

<input id="eventName" placeholder="イベント名">

<div style="height:8px"></div>

<input id="eventStart" type="date">

<div style="height:8px"></div>

<textarea id="eventNote" placeholder="イベント全体備考"></textarea>

<div style="height:8px"></div>

<button class="primary" id="saveEventBtn">

イベント保存

</button>

</div>

<div class="card">

<h2>イベント一覧</h2>

<div id="eventList"></div>

</div>

<div id="trackerArea" class="hidden">

<div class="card">

<h2>Day管理</h2>

<div class="dayNav">

<button id="prevDay" class="secondary">◀</button>

<div class="dayLabel" id="dayLabel">Day1</div>

<button id="nextDay" class="secondary">▶</button>

</div>

<textarea id="dayNote" placeholder="Day備考"></textarea>

<div style="height:8px"></div>

<button class="primary" id="saveDayNote">

Day備考保存

</button>

</div>

<div class="card">

<h2>ポケモン記録</h2>

<input

id="pokemonInput"

placeholder="ポケモン名"

autocomplete="off">

<div id="suggestions" class="suggestBox hidden"></div>

<div style="height:8px"></div>

<div class="row">

<div>

<input

id="pokemonCount"

type="number"

min="1"

value="1">

</div>

<div>

<button

class="primary"

id="addRecordBtn">

記録追加

</button>

</div>

</div>

</div>

<div class="card">

<h2>当日の記録一覧</h2>

<div id="recordList"></div>

</div>

<div class="card">

<h2>全体累計</h2>

<div id="totalCountArea"></div>

<div style="height:8px"></div>

<div id="totalList"></div>

</div>

</div>

<div class="card">

<h2>バックアップ</h2>

<div class="row">

<button

class="secondary"

id="exportBtn">

JSON出力

</button>

<button

class="primary"

id="importBtn">

JSON復元

</button>

</div>

<input

type="file"

accept=".json"

id="importFile"

class="fileInput">

</div>

<div class="footerSpace"></div>

<script>

const STORAGE_KEY = "pokemonSleepTrackerLite";

let data = {

events:[]

};

let selectedEventId = null;

let editingEventId = null;

function createDayObject(){

return {

note:"",

records:{}

};

}

function createEvent(name,startDate,note){

const days = {};

for(let i=1;i<=7;i++){

days[i] = createDayObject();

}

return {

id:crypto.randomUUID(),

name,

startDate,

note,

pokemonList:[],

currentDay:1,

days

};

}

function saveData(){

localStorage.setItem(

STORAGE_KEY,

JSON.stringify(data)

);

}

function loadData(){

const raw =

localStorage.getItem(STORAGE_KEY);

if(raw){

try{

data = JSON.parse(raw);

}

catch(e){

console.error(e);

}

}

}

function getSelectedEvent(){

return data.events.find(

e=>e.id===selectedEventId

);

}
  <script>

function renderEvents(){

const container =

document.getElementById("eventList");

container.innerHTML = "";

data.events.forEach(event=>{

const div =

document.createElement("div");

div.className =

"eventItem" +

(event.id===selectedEventId

?" active":"");

div.innerHTML = `

<div><strong>${escapeHtml(event.name)}</strong></div>

<div>${event.startDate||""}</div>

`;

const openBtn =

document.createElement("button");

openBtn.textContent = "開く";

openBtn.className =

"primary small";

openBtn.onclick = ()=>{

selectedEventId = event.id;

renderAll();

};

const editBtn =

document.createElement("button");

editBtn.textContent = "編集";

editBtn.className =

"secondary small";

editBtn.onclick = ()=>{

editingEventId = event.id;

document.getElementById("eventName").value =

event.name;

document.getElementById("eventStart").value =

event.startDate;

document.getElementById("eventNote").value =

event.note;

window.scrollTo({

top:0,

behavior:"smooth"

});

};

const deleteBtn =

document.createElement("button");

deleteBtn.textContent = "削除";

deleteBtn.className =

"danger small";

deleteBtn.onclick = ()=>{

if(!confirm("削除しますか？")){

return;

}

data.events =

data.events.filter(

e=>e.id!==event.id

);

if(selectedEventId===event.id){

selectedEventId = null;

}

saveData();

renderAll();

};

const row =

document.createElement("div");

row.className = "row";

row.style.marginTop = "8px";

row.appendChild(openBtn);

row.appendChild(editBtn);

row.appendChild(deleteBtn);

div.appendChild(row);

container.appendChild(div);

});

}

function renderTracker(){

const area =

document.getElementById("trackerArea");

const event =

getSelectedEvent();

if(!event){

area.classList.add("hidden");

return;

}

area.classList.remove("hidden");

document.getElementById(

"dayLabel"

).textContent =

"Day" + event.currentDay;

document.getElementById(

"dayNote"

).value =

event.days[event.currentDay].note || "";

renderRecords();

renderTotals();

}

function renderRecords(){

const event =

getSelectedEvent();

if(!event) return;

const day =

event.days[event.currentDay];

const list =

document.getElementById("recordList");

list.innerHTML = "";

const entries =

Object.entries(day.records)

.sort((a,b)=>b[1]-a[1]);

if(entries.length===0){

list.innerHTML =

"<div>記録なし</div>";

return;

}

entries.forEach(([name,count])=>{

const item =

document.createElement("div");

item.className =

"recordItem";

item.innerHTML = `

<div class="recordName">

${escapeHtml(name)}

</div>

`;

const minus =

document.createElement("button");

minus.textContent = "-";

minus.className =

"secondary small";

minus.onclick = ()=>{

day.records[name]--;

if(day.records[name] <= 0){

delete day.records[name];

}

saveData();

renderRecords();

renderTotals();

};

const countDiv =

document.createElement("div");

countDiv.className =

"recordCount";

countDiv.textContent =

count;

const plus =

document.createElement("button");

plus.textContent = "+";

plus.className =

"primary small";

plus.onclick = ()=>{

day.records[name]++;

saveData();

renderRecords();

renderTotals();

};

const del =

document.createElement("button");

del.textContent = "削除";

del.className =

"danger small";

del.onclick = ()=>{

delete day.records[name];

saveData();

renderRecords();

renderTotals();

};

item.appendChild(minus);

item.appendChild(countDiv);

item.appendChild(plus);

item.appendChild(del);

list.appendChild(item);

});

}
  <script>

function renderTotals(){

const event =

getSelectedEvent();

if(!event) return;

const totals = {};

for(let i=1;i<=7;i++){

const records =

event.days[i].records;

for(const name in records){

totals[name] =

(totals[name]||0)

+

records[name];

}

}

const totalList =

document.getElementById("totalList");

const totalCountArea =

document.getElementById(

"totalCountArea"

);

let grandTotal = 0;

Object.values(totals)

.forEach(v=>grandTotal+=v);

totalCountArea.innerHTML =

`総出現数: <strong>${grandTotal}</strong>`;

const sorted =

Object.entries(totals)

.sort((a,b)=>b[1]-a[1]);

totalList.innerHTML = "";

sorted.forEach(([name,count])=>{

const div =

document.createElement("div");

div.className =

"totalItem";

div.innerHTML = `

<span>${escapeHtml(name)}</span>

<strong>${count}</strong>

`;

totalList.appendChild(div);

});

}

function addPokemonRecord(){

const event =

getSelectedEvent();

if(!event) return;

const name =

document.getElementById(

"pokemonInput"

).value.trim();

const count =

parseInt(

document.getElementById(

"pokemonCount"

).value

);

if(!name) return;

const day =

event.days[event.currentDay];

day.records[name] =

(day.records[name]||0)

+

(Math.max(1,count));

if(

!event.pokemonList.includes(name)

){

event.pokemonList.push(name);

}

saveData();

document.getElementById(

"pokemonInput"

).value = "";

hideSuggestions();

renderRecords();

renderTotals();

}

function updateDayNote(){

const event =

getSelectedEvent();

if(!event) return;

event.days[event.currentDay].note =

document.getElementById(

"dayNote"

).value;

saveData();

}

function switchDay(dir){

const event =

getSelectedEvent();

if(!event) return;

event.currentDay += dir;

if(event.currentDay<1){

event.currentDay=1;

}

if(event.currentDay>7){

event.currentDay=7;

}

saveData();

renderTracker();

}

function saveEvent(){

const name =

document.getElementById(

"eventName"

).value.trim();

if(!name){

return;

}

const startDate =

document.getElementById(

"eventStart"

).value;

const note =

document.getElementById(

"eventNote"

).value;

if(editingEventId){

const event =

data.events.find(

e=>e.id===editingEventId

);

if(event){

event.name = name;

event.startDate = startDate;

event.note = note;

}

editingEventId = null;

}else{

const event =

createEvent(

name,

startDate,

note

);

data.events.unshift(event);

}

document.getElementById(

"eventName"

).value = "";

document.getElementById(

"eventStart"

).value = "";

document.getElementById(

"eventNote"

).value = "";

saveData();

renderAll();

}

function escapeHtml(str){

return str

.replaceAll("&","&amp;")

.replaceAll("<","&lt;")

.replaceAll(">","&gt;");

}
  <script>

function showSuggestions(){

const event =

getSelectedEvent();

if(!event) return;

const keyword =

document.getElementById(

"pokemonInput"

).value.trim()

.toLowerCase();

const box =

document.getElementById(

"suggestions"

);

box.innerHTML = "";

const list =

event.pokemonList

.filter(name=>

name.toLowerCase()

.includes(keyword)

);

if(list.length===0){

box.classList.add("hidden");

return;

}

list.forEach(name=>{

const item =

document.createElement("div");

item.className =

"suggestItem";

const useBtn =

document.createElement("button");

useBtn.textContent = name;

useBtn.onclick = ()=>{

document.getElementById(

"pokemonInput"

).value = name;

hideSuggestions();

};

const delBtn =

document.createElement("button");

delBtn.textContent = "×";

delBtn.className =

"danger small";

delBtn.onclick = ()=>{

event.pokemonList =

event.pokemonList.filter(

p=>p!==name

);

saveData();

showSuggestions();

};

item.appendChild(useBtn);

item.appendChild(delBtn);

box.appendChild(item);

});

box.classList.remove("hidden");

}

function hideSuggestions(){

document

.getElementById(

"suggestions"

)

.classList

.add("hidden");

}

function exportJson(){

const blob =

new Blob(

[

JSON.stringify(

data,

null,

2

)

],

{

type:

"application/json"

}

);

const url =

URL.createObjectURL(blob);

const a =

document.createElement("a");

a.href = url;

a.download =

"pokemon-sleep-tracker.json";

a.click();

URL.revokeObjectURL(url);

}

function importJson(file){

const reader =

new FileReader();

reader.onload = ()=>{

try{

const parsed =

JSON.parse(reader.result);

if(

!parsed.events

){

throw new Error();

}

data = parsed;

saveData();

selectedEventId =

data.events[0]?.id || null;

renderAll();

alert("復元完了");

}

catch(e){

alert("JSONエラー");

}

};

reader.readAsText(file);

}

function renderAll(){

renderEvents();

renderTracker();

}

document

.getElementById(

"saveEventBtn"

)

.addEventListener(

"click",

saveEvent

);

document

.getElementById(

"addRecordBtn"

)

.addEventListener(

"click",

addPokemonRecord

);

document

.getElementById(

"saveDayNote"

)

.addEventListener(

"click",

updateDayNote

);

document

.getElementById(

"prevDay"

)

.addEventListener(

"click",

()=>switchDay(-1)

);

document

.getElementById(

"nextDay"

)

.addEventListener(

"click",

()=>switchDay(1)

);

document

.getElementById(

"pokemonInput"

)

.addEventListener(

"input",

showSuggestions

);

document

.getElementById(

"exportBtn"

)

.addEventListener(

"click",

exportJson

);

document

.getElementById(

"importBtn"

)

.addEventListener(

"click",

()=>{

document

.getElementById(

"importFile"

)

.click();

}

);

document

.getElementById(

"importFile"

)

.addEventListener(

"change",

e=>{

const file =

e.target.files[0];

if(file){

importJson(file);

}

}

);

loadData();

if(

data.events.length>0

){

selectedEventId =

data.events[0].id;

}

renderAll();

setInterval(

saveData,

5000

);

</script>

</body>

</html>
