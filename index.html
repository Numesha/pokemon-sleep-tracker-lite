<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Pokemon Sleep Tracker Lite</title>

<style>

body{

margin:0;

padding:16px;

background:#f3f4f6;

font-family:sans-serif;

}

h1{

margin-top:0;

}

.card{

background:white;

padding:16px;

border-radius:12px;

margin-bottom:12px;

}

input,

textarea{

width:100%;

box-sizing:border-box;

padding:10px;

margin-bottom:10px;

border:1px solid #ccc;

border-radius:8px;

font-size:16px;

}

button{

border:none;

padding:10px 16px;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

.primary{

background:#4caf50;

color:white;

}

.secondary{

background:#607d8b;

color:white;

}

.event-item{

padding:12px;

border:1px solid #ddd;

border-radius:10px;

margin-top:8px;

background:#fafafa;

}

</style>

</head>

<body>

<h1>Pokemon Sleep Tracker Lite</h1>

<div class="card">

<h2>イベント作成</h2>

<input id="eventName" placeholder="イベント名">

<input id="eventStart" type="date">

<textarea id="eventNote" placeholder="イベント備考"></textarea>

<button id="saveEventBtn" class="primary">

イベント保存

</button>

</div>

<div class="card">

<h2>イベント一覧</h2>

<div id="eventList"></div>

  <div id="eventDetail" style="display:none;">

  <h2 id="detailTitle"></h2>

  <div>

    <button onclick="prevDay()">◀</button>

    <span id="dayLabel">Day1</span>

    <button onclick="nextDay()">▶</button>

  </div>

<div>

  <button onclick="selectSession(1)">

    1回目

  </button>

  <button onclick="selectSession(2)">

    2回目

  </button>

  <span id="sessionLabel">

    1回目

  </span>

</div>
    
  <textarea

    id="dayNote"

    placeholder="Day備考"

  ></textarea>

  <button onclick="saveDayNote()">

    Day保存

    </button>
    
<h3>ポケモン記録</h3>

<input

  id="pokemonName"

list="pokemonCandidates"
  
  placeholder="ポケモン名"

/>

<datalist id="pokemonCandidates"></datalist>

<details>

  <summary id="currentCandidateTitle">

    今回イベント候補 (0)

  </summary>

<input

  id="currentSearch"

  placeholder="検索"

>
  
  <div id="currentCandidateList"></div>

</details>

<details>

  <summary id="allCandidateTitle">

    全イベント候補 (0)

  </summary>

<input

  id="allSearch"

  placeholder="検索"

>
  
  <div id="allCandidateList"></div>

</details>
    
<button onclick="addPokemonRecord()">

  ＋

</button>

<div id="recordList"></div>

<button onclick="showSummary()">

📊 週間集計

</button>

<button onclick="undoLastAction()">

↩ 元に戻す

</button>
    
<div id="summaryArea" style="display:none;">

  <h3>週間集計</h3>

  <div id="summaryList"></div>

</div>

<h3>バックアップ</h3>

<button onclick="exportData()">

  JSON出力

</button>

<input

  type="file"

  id="importFile"

  accept=".json"

  onchange="importData(event)"

>
    
  </div>

</div>
  
</div>

<script src="app.js"></script>

</body>

</html>
